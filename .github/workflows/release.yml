name: Release

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write

jobs:
  release-xcframework:
    runs-on: macos-14

    env:
      SDL3_VERSION: "release-3.4.10"
      SDL3_IMAGE_VERSION: "release-3.4.0"
      SDL3_TTF_VERSION: "release-3.2.2"
      OBJECTIVELY_BRANCH: "feature/ios"
      IOS_MIN: "14.0"

    steps:
    - name: Install dependencies
      run: brew install autoconf automake libtool pkg-config cmake

    - name: Checkout
      uses: actions/checkout@v5

    - name: Cache xcframework build
      uses: actions/cache@v5
      with:
        path: .build-xcframework
        key: xcframework-${{ env.SDL3_VERSION }}-${{ env.SDL3_IMAGE_VERSION }}-${{ env.SDL3_TTF_VERSION }}-${{ env.OBJECTIVELY_BRANCH }}-ios-${{ env.IOS_MIN }}-${{ hashFiles('configure.ac', 'Sources/**/Makefile.am', 'Sources/ObjectivelyMVC/**/*.c', 'Sources/ObjectivelyMVC/**/*.h', 'scripts/build-xcframework.sh') }}
        restore-keys: |
          xcframework-${{ env.SDL3_VERSION }}-${{ env.SDL3_IMAGE_VERSION }}-${{ env.SDL3_TTF_VERSION }}-${{ env.OBJECTIVELY_BRANCH }}-ios-${{ env.IOS_MIN }}-

    - name: Build xcframeworks
      run: bash scripts/build-xcframework.sh

    - name: Zip xcframeworks
      run: |
        cd Frameworks
        zip -r ../SDL3.xcframework.zip SDL3.xcframework
        zip -r ../SDL3_image.xcframework.zip SDL3_image.xcframework
        zip -r ../SDL3_ttf.xcframework.zip SDL3_ttf.xcframework
        zip -r ../libcurl.xcframework.zip libcurl.xcframework
        zip -r ../Objectively.xcframework.zip Objectively.xcframework
        zip -r ../ObjectivelyMVC.xcframework.zip ObjectivelyMVC.xcframework

    - name: Create release
      run: |
        gh release create ${{ github.ref_name }} \
          --title "ObjectivelyMVC ${{ github.ref_name }}" \
          --generate-notes \
          SDL3.xcframework.zip \
          SDL3_image.xcframework.zip \
          SDL3_ttf.xcframework.zip \
          libcurl.xcframework.zip \
          Objectively.xcframework.zip \
          ObjectivelyMVC.xcframework.zip
      env:
        GH_TOKEN: ${{ github.token }}
