name: Release

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write

env:
  # Objectively and ObjectivelyGPU are source dependencies (resolved via
  # ObjectivelyMVC.xcworkspace). Override to pin an MVC release/branch to a
  # specific ref of either. SDL3 / SDL3_image / SDL3_ttf versions live in
  # fetch-sdl3.sh / fetch-sdl3-extensions.sh, not here.
  OBJECTIVELY_REF: "main"
  OBJECTIVELYGPU_REF: "main"
  HOMEBREW_PREFIX: /opt/homebrew

jobs:
  release-xcframework:
    runs-on: macos-14

    steps:
    # Each dependency's Xcode "Configure" build phase runs autoreconf/configure
    # when built from source (i.e. whenever Config.h isn't already present);
    # the macOS runner image doesn't ship autotools by default. configure.ac
    # hard-requires check (via pkg-config) even though release builds don't
    # run the test suite. sdl3/sdl3_image/sdl3_ttf provide the pkg-config
    # files that Objectively/ObjectivelyGPU/ObjectivelyMVC's own configure
    # scripts check for. macvim provides a modern xxd (supporting -t) on
    # PATH ahead of the runner's older /usr/bin/xxd, which the Assets
    # "Preprocess Assets" build phase requires.
    - name: Install autotools
      run: brew install autoconf automake libtool pkg-config check sdl3 sdl3_image sdl3_ttf macvim

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        ref: ${{ env.OBJECTIVELY_REF }}
        path: Objectively

    - name: Checkout ObjectivelyGPU
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyGPU
        ref: ${{ env.OBJECTIVELYGPU_REF }}
        path: ObjectivelyGPU

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        path: ObjectivelyMVC

    # Xcode's own "Configure" build phases only run `./configure` (never
    # `make install`), and ObjectivelyGPU's Xcode project has no Configure
    # phase at all -- so neither dependency's .pc is ever registered where
    # pkg-config can find it, which is what the later xcodebuild archive step
    # needs for ObjectivelyMVC's own `./configure` to succeed. Build and
    # install both from source first, exactly like the (working) Build
    # workflow does.
    - name: Build Objectively
      working-directory: Objectively
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Build ObjectivelyGPU
      working-directory: ObjectivelyGPU
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    # curl ships no prebuilt xcframework; build it so the iOS slices have curl
    # headers for the Objectively source dependency. macOS uses system curl.
    - name: Build libcurl.xcframework
      working-directory: Objectively
      run: bash ./Frameworks/build-libcurl.sh

    - name: Fetch SDL3.xcframework
      working-directory: ObjectivelyGPU
      run: ./Frameworks/fetch-sdl3.sh

    - name: Fetch SDL3_image / SDL3_ttf xcframeworks
      working-directory: ObjectivelyMVC
      run: ./Frameworks/fetch-sdl3-extensions.sh

    # Archive the framework target (single source of truth — no duplicated file
    # list) per platform, then combine. iOS compiles the Objectively dep from
    # source, so feed curl's headers with an additive -I.
    - name: Build ObjectivelyMVC.xcframework
      working-directory: ObjectivelyMVC
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig
      run: |
        set -euo pipefail
        rm -rf build
        curl_ios="$GITHUB_WORKSPACE/Objectively/Frameworks/libcurl.xcframework/ios-arm64/Headers"
        curl_sim="$GITHUB_WORKSPACE/Objectively/Frameworks/libcurl.xcframework/ios-arm64_x86_64-simulator/Headers"

        xcodebuild archive -workspace ObjectivelyMVC.xcworkspace -scheme ObjectivelyMVC \
          -destination "generic/platform=macOS" -archivePath build/macOS \
          SKIP_INSTALL=NO CODE_SIGNING_ALLOWED=NO

        xcodebuild archive -workspace ObjectivelyMVC.xcworkspace -scheme ObjectivelyMVC \
          -destination "generic/platform=iOS" -archivePath build/iOS \
          SKIP_INSTALL=NO CODE_SIGNING_ALLOWED=NO \
          OTHER_CFLAGS="\$(inherited) -I$curl_ios"

        xcodebuild archive -workspace ObjectivelyMVC.xcworkspace -scheme ObjectivelyMVC \
          -destination "generic/platform=iOS Simulator" -archivePath build/iOS_Simulator \
          SKIP_INSTALL=NO CODE_SIGNING_ALLOWED=NO \
          OTHER_CFLAGS="\$(inherited) -I$curl_sim"

        xcodebuild -create-xcframework \
          -framework build/macOS.xcarchive/Products/Library/Frameworks/ObjectivelyMVC.framework \
          -framework build/iOS.xcarchive/Products/Library/Frameworks/ObjectivelyMVC.framework \
          -framework build/iOS_Simulator.xcarchive/Products/Library/Frameworks/ObjectivelyMVC.framework \
          -output Frameworks/ObjectivelyMVC.xcframework

    - name: Zip xcframeworks
      run: |
        (cd ObjectivelyGPU/Frameworks && zip -r "$GITHUB_WORKSPACE/SDL3.xcframework.zip" SDL3.xcframework)
        (cd ObjectivelyMVC/Frameworks && \
          zip -r "$GITHUB_WORKSPACE/SDL3_image.xcframework.zip" SDL3_image.xcframework && \
          zip -r "$GITHUB_WORKSPACE/SDL3_ttf.xcframework.zip" SDL3_ttf.xcframework && \
          zip -r "$GITHUB_WORKSPACE/ObjectivelyMVC.xcframework.zip" ObjectivelyMVC.xcframework)

    - name: Create release
      working-directory: ObjectivelyMVC
      run: |
        gh release delete ${{ github.ref_name }} --yes || true
        gh release create ${{ github.ref_name }} \
          --title "ObjectivelyMVC ${{ github.ref_name }}" \
          --generate-notes \
          "$GITHUB_WORKSPACE/SDL3.xcframework.zip" \
          "$GITHUB_WORKSPACE/SDL3_image.xcframework.zip" \
          "$GITHUB_WORKSPACE/SDL3_ttf.xcframework.zip" \
          "$GITHUB_WORKSPACE/ObjectivelyMVC.xcframework.zip"
      env:
        GH_TOKEN: ${{ github.token }}
