name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    env:
      HOMEBREW_PREFIX: /opt/homebrew

    steps:
    - name: Install dependencies
      run: |
        brew install autoconf automake libtool pkg-config check \
          sdl3 sdl3_image sdl3_ttf

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Build SDL_shadercross
      run: |
        git clone --depth 1 https://github.com/libsdl-org/SDL_shadercross.git SDL_shadercross
        cmake -S SDL_shadercross -B SDL_shadercross/build \
          -DSDLSHADERCROSS_DXC=OFF \
          -DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF \
          -DCMAKE_PREFIX_PATH=${HOMEBREW_PREFIX}
        cmake --build SDL_shadercross/build
        sudo cmake --install SDL_shadercross/build
        sudo cp SDL_shadercross/build/shadercross /usr/local/bin/
        sudo install_name_tool -add_rpath /usr/local/lib /usr/local/bin/shadercross

    - name: Checkout ObjectivelyGPU
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyGPU
        path: ObjectivelyGPU

    - name: Build ObjectivelyGPU
      working-directory: ObjectivelyGPU
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6

    - name: Build
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/openal-soft/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)

    - name: Test
      run: make check || (cat Tests/ObjectivelyMVC/test-suite.log 2>/dev/null; exit 1)
      env:
        DYLD_LIBRARY_PATH: /usr/local/lib
        DYLD_FALLBACK_LIBRARY_PATH: /usr/local/lib
        CK_FORK: "no"

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          libcurl4-openssl-dev \
          libgl-dev \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
          libxfixes-dev libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
          libdrm-dev libgbm-dev libdecor-0-dev libasound2-dev \
          libfreetype-dev libharfbuzz-dev \
          check \
          cmake

    - name: Build SDL3
      run: |
        git clone --depth 1 --branch release-3.4.2 https://github.com/libsdl-org/SDL.git SDL3
        cmake -S SDL3 -B SDL3/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3/build -j$(nproc)
        sudo cmake --install SDL3/build

    - name: Build SDL3_image
      run: |
        git clone --depth 1 --branch release-3.4.0 https://github.com/libsdl-org/SDL_image.git SDL3_image
        cmake -S SDL3_image -B SDL3_image/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_image/build -j$(nproc)
        sudo cmake --install SDL3_image/build

    - name: Build SDL3_ttf
      run: |
        git clone --depth 1 --branch release-3.2.2 https://github.com/libsdl-org/SDL_ttf.git SDL3_ttf
        cmake -S SDL3_ttf -B SDL3_ttf/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_ttf/build -j$(nproc)
        sudo cmake --install SDL3_ttf/build

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Install spirv-cross
      run: |
        git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Cross.git SPIRV-Cross
        cmake -S SPIRV-Cross -B SPIRV-Cross/build -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SPIRV-Cross/build -j$(nproc)
        sudo cmake --install SPIRV-Cross/build

    - name: Build SDL_shadercross
      run: |
        git clone --depth 1 https://github.com/libsdl-org/SDL_shadercross.git SDL_shadercross
        cmake -S SDL_shadercross -B SDL_shadercross/build \
          -DSDLSHADERCROSS_DXC=OFF \
          -DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF \
          -DCMAKE_PREFIX_PATH=/usr/local
        cmake --build SDL_shadercross/build -j$(nproc)
        sudo cmake --install SDL_shadercross/build
        sudo cp SDL_shadercross/build/shadercross /usr/local/bin/

    - name: Checkout ObjectivelyGPU
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyGPU
        path: ObjectivelyGPU

    - name: Build ObjectivelyGPU
      working-directory: ObjectivelyGPU
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Refresh shared library cache
      run: sudo ldconfig

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6

    - name: Build
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)

    - name: Test
      run: make check

  build-windows:
    runs-on: windows-latest

    env:
      BUILD_CONFIGURATION: Release

    steps:
    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        path: ObjectivelyMVC

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Build Objectively
      working-directory: ${{ github.workspace }}/Objectively
      run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 Objectively.vs15/Objectively.sln

    - name: Build ObjectivelyMVC
      working-directory: ${{ github.workspace }}/ObjectivelyMVC
      run: msbuild /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 ObjectivelyMVC.vs15/ObjectivelyMVC.sln

  release:
    needs: [build-macos, build-linux, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Create release
      run: |
        gh release create ${{ github.ref_name }} \
          --title "ObjectivelyMVC ${{ github.ref_name }}" \
          --generate-notes
      env:
        GH_TOKEN: ${{ github.token }}
